<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savery - Create a Recipe</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/nav.css" />
    <link rel="stylesheet" href="./css/create-recipe.css" />
  </head>
  <body>
    <nav class="savery-nav">
      <div class="nav-left">
        <a href="createRecipes.html" class="nav-btn nav-btn--active">Create a Recipe</a>
        <a href="planner.html" class="nav-btn">Plan Your Meals</a>
      </div>
      <div class="nav-center">
        <a href="index.html" class="nav-logo" aria-label="Savery">
          <svg
            class="nav-logo-wordmark"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 190 64"
            aria-hidden="true"
          >
            <g fill="currentColor">
              <ellipse cx="11" cy="10.5" rx="5.5" ry="6.5" />
              <rect x="9" y="16" width="4" height="36" rx="2" />
              <rect x="23" y="4" width="3.5" height="31" rx="1.75" />
              <rect x="20" y="35" width="9.5" height="3" rx="1" />
              <rect x="20.5" y="38" width="2" height="14" rx="1" />
              <rect x="24.25" y="38" width="2" height="14" rx="1" />
              <rect x="28" y="38" width="2" height="14" rx="1" />
            </g>
            <text
              x="44"
              y="46"
              font-family="Nunito, Segoe UI, Arial, sans-serif"
              font-weight="500"
              font-size="42"
              fill="currentColor"
              letter-spacing="0.5"
            >
              Savery
            </text>
          </svg>
        </a>
      </div>
      <div class="nav-right">
        <a href="favorites.html" class="nav-btn">Favorites</a>
        <span class="nav-heart">&#9829;</span>
      </div>
    </nav>

    <main class="container py-4 create-recipe-main">
      <h2 class="h4 text-center fw-bold mb-4">Submit a Recipe Form</h2>

      <form id="createRecipeForm" class="bg-white border p-4" novalidate>
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label text-sm-end" for="recipeName">
            Name of Recipe <span class="text-danger">*</span>
          </label>
          <div class="col-sm-8">
            <input
              type="text"
              id="recipeName"
              name="name"
              class="form-control"
              required
            />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-4 col-form-label text-sm-end" for="recipeIngredients">
            Ingredients <span class="text-danger">*</span>
          </label>
          <div class="col-sm-8">
            <textarea
              id="recipeIngredients"
              name="ingredients"
              class="form-control"
              rows="5"
              placeholder="One ingredient per line"
              required
            ></textarea>
            <div class="form-text text-danger hidden" id="ingredientsHint" role="alert"></div>
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-4 col-form-label text-sm-end" for="recipeInstructions">
            Instructions <span class="text-danger">*</span>
          </label>
          <div class="col-sm-8">
            <textarea
              id="recipeInstructions"
              name="instructions"
              class="form-control"
              rows="5"
              placeholder="One step per line"
              required
            ></textarea>
            <div class="form-text text-danger hidden" id="instructionsHint" role="alert"></div>
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-4 col-form-label text-sm-end" for="recipeCost">
            Cost <span class="text-danger">*</span>
          </label>
          <div class="col-sm-8">
            <input
              type="number"
              id="recipeCost"
              name="cost"
              class="form-control"
              min="0"
              step="0.01"
              required
            />
            <div class="form-text">Total cost for the whole recipe (USD)</div>
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-4 col-form-label text-sm-end" for="recipePrepTime">
            Prep Time <span class="text-danger">*</span>
          </label>
          <div class="col-sm-8">
            <input
              type="number"
              id="recipePrepTime"
              name="preparation_time"
              class="form-control"
              min="0"
              step="1"
              required
            />
            <div class="form-text">Minutes</div>
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-4 col-form-label text-sm-end" for="recipeImage">
            Image of Meal
          </label>
          <div class="col-sm-8">
            <input
              type="url"
              id="recipeImage"
              name="image_url"
              class="form-control"
              placeholder="https://..."
            />
          </div>
        </div>

        <fieldset class="border p-3 mb-4">
          <legend class="float-none w-auto px-2 fs-6 fw-semibold mb-0">
            For Recipe Discovery
          </legend>

          <div class="row mb-3">
            <label class="col-sm-4 col-form-label text-sm-end" for="recipeCookTime">
              Cook Time
            </label>
            <div class="col-sm-8">
              <input
                type="number"
                id="recipeCookTime"
                name="cook_time"
                class="form-control"
                min="0"
                step="1"
                value="0"
              />
              <div class="form-text">Minutes</div>
            </div>
          </div>

          <div class="row mb-3">
            <label class="col-sm-4 col-form-label text-sm-end" for="recipeServings">
              Servings
            </label>
            <div class="col-sm-8">
              <input
                type="number"
                id="recipeServings"
                name="serving_size"
                class="form-control"
                min="1"
                step="1"
                value="1"
              />
            </div>
          </div>

          <div class="row mb-3">
            <label class="col-sm-4 col-form-label text-sm-end" for="recipeCuisine">
              Cuisine <span class="text-danger">*</span>
            </label>
            <div class="col-sm-8">
              <select id="recipeCuisine" name="cuisine" class="form-select" required>
                <option value="">Select cuisine</option>
                <option>American</option>
                <option>Asian</option>
                <option>British</option>
                <option>Chinese</option>
                <option>French</option>
                <option>Indian</option>
                <option>Italian</option>
                <option>Japanese</option>
                <option>Korean</option>
                <option>Mediterranean</option>
                <option>Mexican</option>
                <option>Middle Eastern</option>
                <option>Thai</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <label class="col-sm-4 col-form-label text-sm-end" for="recipeMealType">
              Meal <span class="text-danger">*</span>
            </label>
            <div class="col-sm-8">
              <select id="recipeMealType" name="meal_type" class="form-select" required>
                <option value="">Select meal</option>
                <option>Breakfast</option>
                <option>Lunch</option>
                <option>Dinner</option>
                <option>Snack</option>
                <option>Side</option>
                <option>Dessert</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <label class="col-sm-4 col-form-label text-sm-end" for="recipeProtein">
              Protein (g) <span class="text-danger">*</span>
            </label>
            <div class="col-sm-8">
              <input
                type="number"
                id="recipeProtein"
                name="protein"
                class="form-control"
                min="0"
                step="1"
                required
              />
            </div>
          </div>

          <div class="row mb-3">
            <label class="col-sm-4 col-form-label text-sm-end" for="recipeDiet">
              Diet
            </label>
            <div class="col-sm-8">
              <select id="recipeDiet" name="dietary_restrictions" class="form-select">
                <option>None</option>
                <option>Vegetarian</option>
                <option>Vegan</option>
                <option>Gluten-free</option>
                <option>Pescatarian</option>
              </select>
            </div>
          </div>

          <div class="row mb-0">
            <label class="col-sm-4 col-form-label text-sm-end" for="recipeSpice">
              Spice Level
            </label>
            <div class="col-sm-8">
              <select id="recipeSpice" name="spice_level" class="form-select">
                <option>Mild</option>
                <option>Medium</option>
                <option>Hot</option>
              </select>
            </div>
          </div>
        </fieldset>

        <div class="alert alert-danger hidden" id="formError" role="alert"></div>
        <div class="alert alert-success hidden" id="formSuccess" role="alert"></div>

        <div class="d-flex justify-content-end mt-3">
          <button type="submit" class="btn btn-success" id="submitBtn">
            Submit
          </button>
        </div>
      </form>
    </main>

    <script type="module" src="./js/createRecipePage.js"></script>
  </body>
</html>
