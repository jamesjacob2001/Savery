<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savery - Recipe Discovery</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="discovery-page">
    <nav class="savery-nav">
      <div class="nav-left">
        <a href="createRecipes.html" class="nav-btn">Create a Recipe</a>
        <a href="planner.html" class="nav-btn">Plan Your Meals</a>
      </div>
      <div class="nav-center">
        <a href="index.html" class="nav-logo" aria-label="Savery">
          <svg
            class="nav-logo-wordmark"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 190 64"
            aria-hidden="true"
          >
            <g fill="currentColor">
              <ellipse cx="11" cy="10.5" rx="5.5" ry="6.5" />
              <rect x="9" y="16" width="4" height="36" rx="2" />
              <rect x="23" y="4" width="3.5" height="31" rx="1.75" />
              <rect x="20" y="35" width="9.5" height="3" rx="1" />
              <rect x="20.5" y="38" width="2" height="14" rx="1" />
              <rect x="24.25" y="38" width="2" height="14" rx="1" />
              <rect x="28" y="38" width="2" height="14" rx="1" />
            </g>
            <text
              x="44"
              y="46"
              font-family="Nunito, Segoe UI, Arial, sans-serif"
              font-weight="500"
              font-size="42"
              fill="currentColor"
              letter-spacing="0.5"
            >
              Savery
            </text>
          </svg>
        </a>
      </div>
      <div class="nav-right">
        <a href="favorites.html" class="nav-btn">Favorites</a>
        <span class="nav-heart">&#9829;</span>
      </div>
    </nav>

    <main class="discovery-main">
      <div class="discovery-search-row">
        <input
          type="text"
          id="recipeSearchInput"
          class="savery-search-input"
          placeholder="Search recipes..."
        />
        <div class="filter-wrap">
          <button
            type="button"
            id="filterToggleBtn"
            class="filter-btn"
            aria-expanded="false"
            aria-controls="filterPanel"
            aria-label="Filter recipes"
          >
            <svg
              class="filter-btn-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
            </svg>
            <span class="filter-active-dot hidden" id="filterActiveDot" aria-hidden="true"></span>
          </button>
          <div id="filterPanel" class="filter-panel hidden" role="region" aria-label="Recipe filters">
            <div class="filter-panel-header">
              <h3 class="filter-panel-title">Filters</h3>
              <button type="button" id="filterClearBtn" class="filter-clear-btn">Clear all</button>
            </div>
            <div class="filter-group">
              <span class="filter-group-label">Cuisine</span>
              <div class="filter-options" id="filterCuisineOptions"></div>
            </div>
            <div class="filter-group">
              <span class="filter-group-label">Meal</span>
              <div class="filter-options" id="filterMealOptions"></div>
            </div>
            <div class="filter-group">
              <span class="filter-group-label">Diet</span>
              <div class="filter-options" id="filterDietOptions"></div>
            </div>
            <div class="filter-group">
              <label class="filter-group-label" for="filterMaxTime">Max total time</label>
              <select id="filterMaxTime" class="filter-select">
                <option value="">Any time</option>
                <option value="20">Under 20 min</option>
                <option value="30">Under 30 min</option>
                <option value="45">Under 45 min</option>
                <option value="60">Under 60 min</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="cost-scale">
        <div class="cost-scale-header">
          <label class="cost-scale-label" for="costScaleInput">Max cost per serving</label>
          <span class="cost-scale-value" id="costScaleValue">—</span>
        </div>
        <input
          type="range"
          id="costScaleInput"
          class="cost-scale-slider"
          min="0"
          max="100"
          step="1"
          value="100"
        />
        <div class="cost-scale-ticks" id="costScaleTicks" aria-hidden="true"></div>
      </div>

      <h2 class="discovery-heading" id="discoveryHeading">Recipes</h2>

      <div class="recipe-grid" id="recipesGrid"></div>

      <p class="empty-state hidden" id="emptyState">
        No recipes match your search.
      </p>
      <p class="discovery-error hidden" id="errorState"></p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./js/recipePage.js"></script>
  </body>
</html>
