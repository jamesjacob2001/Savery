<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savery - Recipe Discovery</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="discovery-page">
    <nav class="savery-nav">
      <div class="nav-left">
        <a href="index.html" class="nav-btn nav-btn--active">Create a Recipe</a>
        <a href="planner.html" class="nav-btn">Plan Your Meals</a>
      </div>
      <div class="nav-center">
        <a href="index.html" class="nav-logo" aria-label="Savery">
          <svg
            class="nav-logo-wordmark"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 180 76"
            aria-hidden="true"
          >
            <g fill="currentColor">
              <ellipse cx="24" cy="10" rx="5.5" ry="7.5" />
              <rect x="21.5" y="15" width="5" height="55" rx="2.5" />
              <rect x="32" y="15" width="4" height="48" rx="2" />
            </g>
            <path
              d="M30.5 63v7M34 63v7M37.5 63v7"
              stroke="currentColor"
              stroke-width="3.5"
              stroke-linecap="round"
              fill="none"
            />
            <path
              d="M36 32c0-4-3.5-7-9-7s-9 3-9 6.5c0 3.5 3.5 5.5 9 6s9 2.5 9 6c0 3.5-3.5 6.5-9 6.5s-8.5-2.5-8.5-6"
              stroke="currentColor"
              stroke-width="5.5"
              stroke-linecap="round"
              fill="none"
            />
            <text
              x="48"
              y="53"
              font-family="Nunito, Segoe UI, Arial, sans-serif"
              font-weight="500"
              font-size="48"
              fill="currentColor"
              letter-spacing="0.5"
            >
              avery
            </text>
          </svg>
        </a>
      </div>
      <div class="nav-right">
        <a href="favorites.html" class="nav-btn">Favorites</a>
        <span class="nav-heart">&#9829;</span>
      </div>
    </nav>

    <main class="discovery-main">
      <div class="discovery-search-row">
        <input
          type="text"
          id="recipeSearchInput"
          class="savery-search-input"
          placeholder="Search recipes..."
        />
        <span class="filter-icon" aria-hidden="true">&#9776;</span>
      </div>

      <div class="cost-scale">
        <div class="cost-scale-header">
          <label class="cost-scale-label" for="costScaleInput">Max cost</label>
          <span class="cost-scale-value" id="costScaleValue">$30</span>
        </div>
        <input
          type="range"
          id="costScaleInput"
          class="cost-scale-slider"
          min="0"
          max="30"
          step="1"
          value="30"
          aria-valuemin="0"
          aria-valuemax="30"
          aria-valuenow="30"
        />
        <div class="cost-scale-ticks" aria-hidden="true">
          <span>$0</span>
          <span>$10</span>
          <span>$20</span>
          <span>$30</span>
        </div>
      </div>

      <h2 class="discovery-heading" id="discoveryHeading">Under $30</h2>

      <div class="recipe-grid" id="recipesGrid"></div>

      <p class="empty-state hidden" id="emptyState">
        No recipes match your search.
      </p>
      <p class="discovery-error hidden" id="errorState"></p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./js/recipePage.js"></script>
  </body>
</html>
