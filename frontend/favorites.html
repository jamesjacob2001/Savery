<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savery - Favorites</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Shared app styles -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>

    <!-- ── Navigation Bar ── -->
    <nav class="savery-nav">
      <div class="nav-left">
        <a href="createRecipes.html" class="nav-btn">Create a Recipe</a>
        <a href="planner.html" class="nav-btn">Plan Your Meals</a>
      </div>
      <div class="nav-center">
        <a href="index.html" class="nav-logo" aria-label="Savery">
          <svg
            class="nav-logo-wordmark"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 190 64"
            aria-hidden="true"
          >
            <g fill="currentColor">
              <ellipse cx="11" cy="10.5" rx="5.5" ry="6.5" />
              <rect x="9" y="16" width="4" height="36" rx="2" />
              <rect x="23" y="4" width="3.5" height="31" rx="1.75" />
              <rect x="20" y="35" width="9.5" height="3" rx="1" />
              <rect x="20.5" y="38" width="2" height="14" rx="1" />
              <rect x="24.25" y="38" width="2" height="14" rx="1" />
              <rect x="28" y="38" width="2" height="14" rx="1" />
            </g>
            <text
              x="44"
              y="46"
              font-family="Nunito, Segoe UI, Arial, sans-serif"
              font-weight="500"
              font-size="42"
              fill="currentColor"
              letter-spacing="0.5"
            >
              Savery
            </text>
          </svg>
        </a>
      </div>
      <div class="nav-right">
        <a href="favorites.html" class="nav-btn nav-btn--active">Favorites</a>
        <span class="nav-heart">&#9829;</span>
      </div>
    </nav>

    <!-- ── Page Header ── -->
    <main class="favorites-main">
      <h2 class="favorites-heading">Favorite Menu</h2>
      <p class="favorites-hint">Click the heart on a recipe card to remove it from favorites.</p>

      <!-- ── Search Bar ── -->
      <div class="favorites-search-row">
        <input
          type="text"
          id="favSearchInput"
          class="savery-search-input"
          placeholder="Search saved recipes..."
        />
        <span class="filter-icon">&#9776;</span>
      </div>

      <!-- ── Recipe Cards Grid ── -->
      <!--
        Cards are injected here by favoritesPage.js
        Each card shows: recipe image, name, cost, and a filled heart to unsave
      -->
      <div class="recipe-grid" id="favoritesGrid">
        <!-- Populated dynamically -->
      </div>

      <!-- ── Empty State Message (shown when no favorites) ── -->
      <p class="empty-state hidden" id="emptyState">
        You have no saved recipes yet. Go to the
        <a href="index.html">Recipe Discovery</a> page to save some!
      </p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Favorites page logic -->
    <script type="module" src="./js/favoritesPage.js"></script>
  </body>
</html>
